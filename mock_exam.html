<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Syniti Quality Mock Exam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="quiz-layout">
    <div class="quiz-card">
      <div class="title-container">
        <h1>Syniti Quality Mock Exam</h1>
        <a href="index.html" class="mock-btn">Back to Practice</a>
      </div>
      <div class="status" id="mock-exam-banner" style="background: #4a6954; color: #ffffff;">
        60-question mock exam — 90 minutes.
      </div>
      <div class="status" id="mock-timer">Time remaining: 90:00</div>
      <div id="question-container"></div>
      <div class="status" id="status"></div>
      <div class="status" id="score"></div>
      <div class="controls">
        <button id="prev-btn">Previous</button>
        <button id="submit-btn">Submit</button>
        <button id="next-btn">Next</button>
      </div>
    </div>
    <aside class="questions-panel">
      <h2>Question navigation</h2>
      <div class="questions-list" id="questions-list"></div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
